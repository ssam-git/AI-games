const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(type) {
ensureAudio();
if (!audioCtx) return;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
const now = audioCtx.currentTime;

switch(type) {
case 'shoot':
osc.type = 'square';
osc.frequency.setValueAtTime(600, now);
osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
gain.gain.setValueAtTime(0.15, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
osc.start(now);
osc.stop(now + 0.1);
break;
case 'explosion':
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(200, now);
osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
osc.start(now);
osc.stop(now + 0.3);
break;
case 'alienStep':
osc.type = 'square';
const freqs = [160, 170, 180, 190];
const f = freqs[stepIndex % 4];
osc.frequency.setValueAtTime(f, now);
gain.gain.setValueAtTime(0.08, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
osc.start(now);
osc.stop(now + 0.05);
break;
case 'playerHit':
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(300, now);
osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
gain.gain.setValueAtTime(0.25, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
osc.start(now);
osc.stop(now + 0.5);
break;
case 'ufo':
osc.type = 'sine';
osc.frequency.setValueAtTime(400, now);
osc.frequency.setValueAtTime(500, now + 0.1);
osc.frequency.setValueAtTime(400, now + 0.2);
gain.gain.setValueAtTime(0.1, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
osc.start(now);
osc.stop(now + 0.3);
break;
case 'levelUp':
osc.type = 'square';
[523, 659, 784, 1047].forEach((f, i) => {
osc.frequency.setValueAtTime(f, now + i * 0.12);
});
gain.gain.setValueAtTime(0.15, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
osc.start(now);
osc.stop(now + 0.6);
break;
}
}

// Fill in the shield shape
function buildShieldShape(grid) {
const rows = grid.length;
const cols = grid[0].length;
const cx = Math.floor(cols / 2);
const cy = rows - 1;

for (let y = 0; y < rows; y++) {
for (let x = 0; x < cols; x++) {
let alive = true;
const dx = x - cx;

// Arch cutout at bottom center
const archRow = rows - 10;
if (y >= archRow) {
const progress = y - archRow;
const halfWidth = Math.max(0, progress * 1.5);
if (Math.abs(dx) < halfWidth) alive = false;
}

// Top corners cut
if (y < 3 && (x < 4 || x >= cols - 4)) alive = false;

// Top center notch
if (y < 2 && x >= cx - 3 && x <= cx + 2) alive = false;

// Fill the shield body
if (alive) {
// Draw a filled arch shape
const maxHalf = Math.floor((rows - archRow) * 1.5);
const distFromCenter = Math.abs(dx);
const yFromBottom = cy - y;

if (yFromBottom < 10) {
// Bottom section: wide base
const baseWidth = 14;
if (distFromCenter > baseWidth) alive = false;
} else {
// Upper section: narrower
const taperWidth = 14 - Math.floor((yFromBottom - 10) * 0.3);
if (distFromCenter > taperWidth) alive = false;
}
}

grid[y][x] = alive ? 1 : 0;
}
}
}

function initAliens() {

const startY = 80;

for (let row = 0; row < rows; row++) {

aliens.push({

height: 32

// Block size for shields
const BLOCK_SIZE = 3;   // Reduced from 4 (scales shield down by ~25%)
const SHIELD_COLS = 30; // Kept original to preserve procedural shape proportions
const SHIELD_ROWS = 22; // Kept original to preserve procedural shape proportions


function initShields() {
shieldGrids = [];
const shieldCenters = [130, 260, 390, 520]; // centered positions

shieldCenters.forEach(cx => {
// Create grid
const grid = [];
for (let y = 0; y < SHIELD_ROWS; y++) {
grid[y] = [];
for (let x = 0; x < SHIELD_COLS; x++) {
grid[y][x] = 1;
}
}

// Apply the shield shape
buildShieldShape(grid);

// Store the shield
shieldGrids.push({
grid: grid,
originX: cx - Math.floor(SHIELD_COLS * BLOCK_SIZE / 2),
originY: 480,
cols: SHIELD_COLS,
rows: SHIELD_ROWS
});
});
}

function drawPixelSprite(sprite, x, y, color, pixelSize) {
ctx.fillStyle = color;
for (let row = 0; row < sprite.length; row++) {
for (let col = 0; col < sprite[row].length; col++) {
if (sprite[row][col]) {
ctx.fillRect(x + col * pixelSize, y + row * pixelSize, pixelSize, pixelSize);
}
}
}
}

// --- Check if a bullet hits a shield block ---
function hitShield(bulletX, bulletY) {
let hit = false;
for (let s = 0; s < shieldGrids.length; s++) {
const shield = shieldGrids[s];
// Convert bullet position to grid coordinates
const gx = Math.floor((bulletX - shield.originX) / BLOCK_SIZE);
const gy = Math.floor((bulletY - shield.originY) / BLOCK_SIZE);

// Check the block the bullet is in, plus surrounding blocks (for area-based hit)
for (let dy = -1; dy <= 1; dy++) {
for (let dx = -1; dx <= 1; dx++) {
const cx = gx + dx;
const cy = gy + dy;
if (cx >= 0 && cx < shield.cols && cy >= 0 && cy < shield.rows) {
if (shield.grid[cy][cx]) {
// Destroy this block and nearby blocks for a satisfying hole
shield.grid[cy][cx] = 0;
// Also destroy adjacent blocks to create a proper hole
for (let dy2 = -1; dy2 <= 1; dy2++) {
for (let dx2 = -1; dx2 <= 1; dx2++) {
const nx = cx + dx2;
const ny = cy + dy2;
if (nx >= 0 && nx < shield.cols && ny >= 0 && ny < shield.rows) {
if (shield.grid[ny][nx] && Math.random() > 0.3) {
shield.grid[ny][nx] = 0;
}
}
}
}
hit = true;
break;
}
}
}
if (hit) break;
}
if (hit) break;
}
return hit;
}

function update() {
frameCount++;

if (gameState !== STATE.PLAYING) {
// Still update floating texts even when not playing
floatingTexts.forEach(ft => { ft.y -= 0.5; ft.life--; });
floatingTexts = floatingTexts.filter(ft => ft.life > 0);
return;
}

// Player movement
if (keys['ArrowLeft'] || keys['KeyA']) {
player.x -= player.speed;
}
if (keys['ArrowRight'] || keys['KeyD']) {
player.x += player.speed;
}
player.x = Math.max(30, Math.min(canvas.width - 30, player.x));

// Shooting
if (player.shootCooldown > 0) player.shootCooldown--;
if (keys['Space'] && player.shootCooldown <= 0 && player.bullets.length < 2) {
player.bullets.push({ x: player.x, y: player.y - 30, speed: -8 });
player.shootCooldown = 15;
playSound('shoot');
}

// Player invincibility
if (player.invincible > 0) player.invincible--;

// Update player bullets
player.bullets.forEach(b => b.y += b.speed);
player.bullets = player.bullets.filter(b => b.y > -10);

// Update alien bullets
alienBullets.forEach(b => b.y += b.speed);
alienBullets = alienBullets.filter(b => b.y < canvas.height + 10);

// Alien movement
alienMoveTimer++;
const currentInterval = Math.max(3, alienMoveInterval - (55 - aliensAlive) * 0.7);

if (alienMoveTimer >= currentInterval) {
alienMoveTimer = 0;
stepIndex++;

let needDrop = false;
aliens.forEach(a => {
if (!a.alive) return;
if ((alienDirection > 0 && a.x + 16 >= canvas.width - 20) ||
(alienDirection < 0 && a.x - 16 <= 20)) {
needDrop = true;
}
});

if (needDrop) {
alienDirection *= -1;
aliens.forEach(a => { if (a.alive) a.y += alienDropAmount; });
} else {
aliens.forEach(a => { if (a.alive) a.x += 8 * alienDirection; });
}

const frameToggle = Math.floor(stepIndex / 3) % 2;
aliens.forEach(a => { if (a.alive) a.frame = frameToggle; });

playSound('alienStep');
}

// Alien shooting
const aliveAliens = aliens.filter(a => a.alive);
if (aliveAliens.length > 0 && Math.random() < 0.015 + (level * 0.003)) {
const columns = {};
aliveAliens.forEach(a => {
const col = Math.round(a.x / 48);
if (!columns[col] || a.y > columns[col].y) {
columns[col] = a;
}
});
const shooters = Object.values(columns);
const shooter = shooters[Math.floor(Math.random() * shooters.length)];
if (shooter && alienBullets.length < 5 + level) {
alienBullets.push({
x: shooter.x,
y: shooter.y + 16,
speed: 3 + level * 0.5
});
}
}

// UFO
ufoTimer--;
if (ufoTimer <= 0 && !ufo) {
ufo = {
x: -30,
y: 40,
speed: 2,
points: [50, 100, 150, 200, 300][Math.floor(Math.random() * 5)]
};
ufoTimer = 600 + Math.random() * 600;
}
if (ufo) {
ufo.x += ufo.speed;
ufoSoundTimer++;
if (ufoSoundTimer % 15 === 0) playSound('ufo');
if (ufo.x > canvas.width + 30) ufo = null;
}

// Collision: player bullets vs aliens
player.bullets.forEach((b, bi) => {
aliens.forEach(a => {
if (!a.alive) return;
if (Math.abs(b.x - a.x) < 16 && Math.abs(b.y - a.y) < 16) {
a.alive = false;
aliensAlive--;
score += alienPoints[a.type];
spawnParticles(a.x, a.y, alienColors[a.type], 12);
playSound('explosion');
player.bullets.splice(bi, 1);
}
});
});

// Collision: player bullets vs UFO
if (ufo) {
player.bullets.forEach((b, bi) => {
if (Math.abs(b.x - ufo.x) < 22 && Math.abs(b.y - ufo.y) < 10) {
score += ufo.points;
spawnParticles(ufo.x, ufo.y, '#FF0000', 20);
playSound('explosion');
floatingTexts.push({
text: `+${ufo.points}`,
x: ufo.x,
y: ufo.y,
life: 40,
maxLife: 40,
size: 20,
color: '#FF0000'
});
ufo = null;
player.bullets.splice(bi, 1);
}
});
}

// Collision: bullets vs shields
player.bullets.forEach((b, bi) => {
if (hitShield(b.x, b.y)) {
player.bullets.splice(bi, 1);
}
});

alienBullets.forEach((b, bi) => {
if (hitShield(b.x, b.y)) {
alienBullets.splice(bi, 1);
}
});

// Collision: alien bullets vs player
if (player.invincible <= 0) {
alienBullets.forEach((b, bi) => {
if (Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 16) {
lives--;
player.invincible = 120;
spawnParticles(player.x, player.y, '#00FF00', 25);
playSound('playerHit');
alienBullets.splice(bi, 1);
if (lives <= 0) {
gameState = STATE.GAME_OVER;
if (score > highScore) {
highScore = score;
localStorage.setItem('siHighScore', highScore);
}
}
}
});
}

// Collision: aliens reaching player level
aliveAliens.forEach(a => {
if (a.y + 16 >= player.y - 20) {
gameState = STATE.GAME_OVER;
if (score > highScore) {
highScore = score;
localStorage.setItem('siHighScore', highScore);
}
}
});

// Check win condition
if (aliensAlive <= 0) {
gameState = STATE.WIN;
playSound('levelUp');
}

// Update particles
particles.forEach(p => {
p.x += p.vx;
p.y += p.vy;
p.life--;
p.vy += 0.1;
});
particles = particles.filter(p => p.life > 0);
}

function draw() {
ctx.fillStyle = '#000000';
ctx.fillRect(0, 0, canvas.width, canvas.height);

stars.forEach(s => {
s.y += s.speed;
if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
const flicker = Math.sin(frameCount * 0.05 + s.brightness * 10) * 0.3 + 0.7;
ctx.fillStyle = `rgba(255, 255, 255, ${flicker * 0.5})`;
ctx.fillRect(s.x, s.y, s.size, s.size);
});

ctx.fillStyle = '#00FF00';
ctx.fillRect(0, canvas.height - 30, canvas.width, 1);

if (gameState === STATE.MENU) {
drawMenu();
return;
}

if (gameState === STATE.PLAYING || gameState === STATE.WIN) {
drawShields();
}

aliens.forEach(a => {
if (a.alive) drawAlien(a);
});

if (gameState === STATE.PLAYING) drawUFO();

drawBullets();

if (gameState === STATE.PLAYING) drawPlayer();

// Draw floating texts
drawFloatingTexts();

particles.forEach(p => {
const alpha = p.life / p.maxLife;
ctx.fillStyle = p.color;
ctx.globalAlpha = alpha;
ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
});
ctx.globalAlpha = 1;

drawScore();
if (gameState === STATE.PLAYING) drawLives();

if (gameState === STATE.GAME_OVER) drawGameOver();
if (gameState === STATE.WIN) drawWin();

for (let y = 0; y < canvas.height; y += 3) {
ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
ctx.fillRect(0, y, canvas.width, 1);
}
}

function drawBullets() {
player.bullets.forEach(b => {
ctx.fillStyle = '#FFFFFF';
ctx.fillRect(b.x - 1, b.y, 3, 10);
ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
ctx.fillRect(b.x - 3, b.y, 7, 10);
});

alienBullets.forEach(b => {
ctx.fillStyle = '#FFFFFF';
const t = frameCount % 10;
ctx.fillRect(b.x - 2, b.y, 2, 4);
ctx.fillRect(b.x + (t < 5 ? 2 : -2), b.y + 4, 2, 4);
ctx.fillRect(b.x - 2, b.y + 8, 2, 4);
});
}

function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
